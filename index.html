      <h1>SARI-ONE — Smart Automated Recognition & Identification</h1>
      <p>SARI-ONE is a free AI-powered web application for instant fish species classification and freshness evaluation. Developed by Computer Engineering researchers from the University of Rizal System, Morong, Rizal, Philippines.</p>
      <h2>Our Mission</h2>
      <p>To empower Filipino consumers, wet market vendors, and seafood industry stakeholders with accessible, AI-driven tools that ensure fish quality and food safety — reducing waste and protecting public health.</p>
      <h2>Our Vision</h2>
      <p>A future where every Filipino can instantly verify fish freshness and species authenticity using nothing but a smartphone — making safe, quality seafood accessible to all.</p>
      <h2>Research Team</h2>
      <ul>
        <li>Mark Hexilon Payno — Project Lead, Software & AI Engineer</li>
        <li>Trisha Tumbagahan — Data Scientist & Marine Researcher</li>
        <li>Yvan Joaquin Aquino — Field Researcher & Web Designer</li>
        <li>Philip Inigo Lenida — Field Researcher & Full-Stack Developer</li>
      </ul>
      <h2>Features</h2>
      <ul>
        <li>AI-powered fish species identification via camera</li>
        <li>Freshness scoring with eye clarity, gill color, and texture analysis</li>
        <li>Spoilage countdown and storage recommendations</li>
        <li>Nutritional information and market price estimates</li>
        <li>Scan history and area-based dashboards</li>
        <li>QR code sharing for scan results</li>
      </ul>
      <p>Contact: hexilonpayno@gmail.com | Morong, Rizal, Philippines</p>
